  const centreImg = new Image();
  centreImg.src = IMG_SRC;
  centreImg.onload = () => { imgReady = true; };
  let imgReady = false;


  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    RINGS.forEach(({ rIn, width, speed }, ringIdx) => {
      offsets[ringIdx] += speed * direction;
      const rOut     = rIn + width;
      const rotation = ringIdx * (SECTIONS / 4);

      for (let s = 0; s < SECTIONS; s++) {
        const colour  = COLOURS[(s + rotation) % SECTIONS];
        const aStart  = offsets[ringIdx] + s * sectionAngle + GAP / 2;
        const aEnd    = offsets[ringIdx] + (s + 1) * sectionAngle - GAP / 2;

        ctx.save();

        // Clip to the block shape
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, rOut, aStart, aEnd);
        ctx.arc(CENTER, CENTER, rIn,  aEnd, aStart, true);
        ctx.closePath();
        ctx.clip();

        // Fill background of block
        ctx.fillStyle = '#111';
        ctx.fillRect(CENTER - rOut - 2, CENTER - rOut - 2, (rOut + 2) * 2, (rOut + 2) * 2);

        // Draw halftone dot grid (staggered rows)
        const spacing = 7;
        const dotR    = 2.6;
        for (let gy = CENTER - rOut; gy <= CENTER + rOut; gy += spacing) {
          const row    = Math.round((gy - (CENTER - rOut)) / spacing);
          const offset = (row % 2) * (spacing / 2);   // stagger alternate rows
          for (let gx = CENTER - rOut + offset; gx <= CENTER + rOut; gx += spacing) {
            ctx.beginPath();
            ctx.arc(gx, gy, dotR, 0, Math.PI * 2);
            ctx.fillStyle = colour;
            ctx.fill();
          }
        }

        // Border
        ctx.beginPath();
        ctx.arc(CENTER, CENTER, rOut, aStart, aEnd);
        ctx.arc(CENTER, CENTER, rIn,  aEnd, aStart, true);
        ctx.closePath();
        ctx.strokeStyle = '#111';
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        ctx.restore();
      }
    });


    // Draw circular portrait in centre
    if (imgReady) {
      const r = 82;
      ctx.save();
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(centreImg, CENTER - r, CENTER - r, r * 2, r * 2);
      ctx.restore();
      // Thin border ring
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    // Outer text ring — filled band with rotating circular text
    const TEXT_R_IN  = 322;
    const TEXT_R_OUT = 400;
    const TEXT_R_MID = (TEXT_R_IN + TEXT_R_OUT) / 2;

    // Draw ring background
    ctx.save();
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, TEXT_R_OUT, 0, Math.PI * 2);
    ctx.arc(CENTER, CENTER, TEXT_R_IN,  0, Math.PI * 2, true);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();

    // Draw rotating text along the ring
    const text      = '✦ MAGICAL MYSTICAL CHOPS ✦ MAGICAL MYSTICAL CHOPS ';
    textOffset -= 0.0007 * direction;   // accumulate — no jump on reverse
    const textAngle = textOffset;
    ctx.save();
    ctx.font         = 'bold 17px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < text.length; i++) {
      const a = textAngle + (i / text.length) * Math.PI * 2;
      const x = CENTER + TEXT_R_MID * Math.cos(a);
      const y = CENTER + TEXT_R_MID * Math.sin(a);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a + Math.PI / 2);
      ctx.fillText(text[i], 0, 0);
      ctx.restore();
    }
    ctx.restore();

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
